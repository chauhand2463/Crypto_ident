version: '3.8'

services:
  hardhat:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx hardhat node --host 0.0.0.0"
    ports:
      - "8545:8545"
      - "8546:8546"
    environment:
      - CHAIN_ID=31337

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "cd backend && npm install && npm start"
    ports:
      - "5000:5000"
    depends_on:
      - hardhat
    environment:
      - PORT=5000
      - HARDHAT_URL=http://hardhat:8545
      - CHAIN_ID=31337

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "cd frontend && npm install && npm run dev -- --host --port 80"
    ports:
      - "80:80"
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_CHAIN_ID=31337
      - VITE_IDENTITY_REGISTRY=0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9
      - VITE_BACKEND_URL=http://localhost:5000
