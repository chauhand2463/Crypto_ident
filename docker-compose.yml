services:
  hardhat:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx hardhat node"
    ports:
      - "8545:8545"
      - "8546:8546"
    environment:
      - CHAIN_ID=31337

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm start"
    ports:
      - "5000:5000"
    depends_on:
      - hardhat
    environment:
      - PORT=5000
      - HARDHAT_URL=http://hardhat:8545
      - CHAIN_ID=31337

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host --port 80"
    ports:
      - "80:80"
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_CHAIN_ID=31337
      - VITE_IDENTITY_REGISTRY=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
      - VITE_BACKEND_URL=http://localhost:5000
